apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 */
react {
    entryFile = file("../../index.js")
    cliFile = file("../../node_modules/react-native/cli.js")
    bundleCommand = "bundle"
}

// Memory Optimization: Disable the heavy Metro bundling task inside Gradle.
// We run the bundle manually via 'npx react-native bundle' to avoid OOM crashes.
tasks.whenTaskAdded { task ->
    if (task.name == "createBundleReleaseJsAndAssets") {
        task.enabled = false
    }
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.am_faculty"
    defaultConfig {
        applicationId "com.am_faculty"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    buildFeatures {
        buildConfig true
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    aaptOptions {
        noCompress "tflite"
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    // TensorFlow Lite for native face embedding inference
    implementation("org.tensorflow:tensorflow-lite:2.14.0")

    // ExifInterface for EXIF rotation correction
    implementation("androidx.exifinterface:exifinterface:1.3.7")

    // Google ML Kit Face Detection
    implementation("com.google.mlkit:face-detection:16.1.6")

    implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8")
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
